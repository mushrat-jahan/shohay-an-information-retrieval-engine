<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bengali QA Chatbot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header .logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    header h1 { font-size: 18px; font-weight: 600; color: #f1f5f9; }
    header span { font-size: 12px; color: #64748b; margin-left: auto; }

    #chat-container {
      flex: 1;
      width: 100%;
      max-width: 860px;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .bubble {
      max-width: 78%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14.5px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .user-bubble {
      background: #4f46e5;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .bot-bubble {
      background: #1e293b;
      color: #e2e8f0;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      border: 1px solid #334155;
    }

    .sources {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #334155;
      font-size: 12px;
      color: #94a3b8;
    }

    .sources strong { color: #7dd3fc; display: block; margin-bottom: 4px; }

    .source-pill {
      display: inline-block;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 20px;
      padding: 2px 10px;
      margin: 3px 3px 0 0;
      font-size: 11px;
      color: #94a3b8;
    }

    .source-pill .score {
      background: #1e3a5f;
      color: #93c5fd;
      padding: 1px 5px;
      border-radius: 10px;
      margin-left: 4px;
      font-size: 10px;
    }

    .typing {
      display: flex; gap: 5px; align-items: center;
      padding: 12px 16px;
    }

    .typing span {
      width: 8px; height: 8px;
      background: #64748b;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    #input-bar {
      width: 100%;
      max-width: 860px;
      padding: 16px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #query-input {
      flex: 1;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      color: #e2e8f0;
      font-size: 14px;
      padding: 12px 16px;
      resize: none;
      outline: none;
      max-height: 140px;
      line-height: 1.5;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    #query-input:focus { border-color: #4f46e5; }

    #send-btn {
      background: #4f46e5;
      border: none;
      border-radius: 12px;
      color: #fff;
      width: 44px; height: 44px;
      cursor: pointer;
      font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }

    #send-btn:hover { background: #4338ca; }
    #send-btn:active { transform: scale(0.95); }
    #send-btn:disabled { background: #334155; cursor: not-allowed; }

    #top-k-row {
      width: 100%;
      max-width: 860px;
      padding: 0 16px 8px;
      display: flex;
      gap: 12px;
      align-items: center;
      font-size: 12px;
      color: #64748b;
    }

    #top-k-row label { display: flex; align-items: center; gap: 6px; }
    #top-k-row input[type=range] { width: 80px; accent-color: #4f46e5; }
    #top-k-row #tk-val { color: #94a3b8; font-weight: 600; }

    .welcome {
      text-align: center;
      margin: auto;
      color: #475569;
      padding: 40px 20px;
    }
    .welcome h2 { font-size: 22px; color: #94a3b8; margin-bottom: 10px; }
    .welcome p { font-size: 13px; line-height: 1.7; }
  </style>
</head>
<body>

<header>
  <div class="logo">🔍</div>
  <h1>Bengali QA Chatbot</h1>
  <span id="status">● Loading…</span>
</header>

<div id="chat-container">
  <div class="welcome">
    <h2>নাগরিক সেবা সহায়তা</h2>
    <p>Ask about NID cards, passports, tax, utilities, health, transport,<br>and other government services — in Bengali or English.</p>
  </div>
</div>

<div id="top-k-row">
  <label>
    Passages retrieved:
    <input type="range" id="top-k" min="1" max="10" value="5"
           oninput="document.getElementById('tk-val').textContent=this.value" />
    <span id="tk-val">5</span>
  </label>
</div>

<div id="input-bar">
  <textarea id="query-input" rows="1" placeholder="আপনার প্রশ্ন লিখুন… / Ask a question…"></textarea>
  <button id="send-btn" onclick="sendQuery()" title="Send">➤</button>
</div>

<script>
const chatEl = document.getElementById("chat-container");
const inputEl = document.getElementById("query-input");
const sendBtn = document.getElementById("send-btn");
const statusEl = document.getElementById("status");

// ── Health check ────────────────────────────────────────────────────────────
fetch("/health").then(r => r.json()).then(d => {
  statusEl.textContent = `● ${d.passages_loaded.toLocaleString()} passages loaded`;
  statusEl.style.color = "#4ade80";
}).catch(() => {
  statusEl.textContent = "● Offline";
  statusEl.style.color = "#f87171";
});

// ── Auto-resize textarea ────────────────────────────────────────────────────
inputEl.addEventListener("input", () => {
  inputEl.style.height = "auto";
  inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + "px";
});

inputEl.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendQuery(); }
});

// ── Chat helpers ────────────────────────────────────────────────────────────
function appendBubble(text, role, id) {
  // Remove welcome message on first use
  const welcome = chatEl.querySelector(".welcome");
  if (welcome) welcome.remove();

  const div = document.createElement("div");
  div.className = `bubble ${role}-bubble`;
  if (id) div.id = id;
  div.textContent = text;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  return div;
}

function appendTyping() {
  const div = document.createElement("div");
  div.className = "bubble bot-bubble typing";
  div.id = "typing";
  div.innerHTML = "<span></span><span></span><span></span>";
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  return div;
}

function appendSources(bubble, passages) {
  if (!passages || !passages.length) return;
  const sec = document.createElement("div");
  sec.className = "sources";
  sec.innerHTML = "<strong>📚 Retrieved passages</strong>";
  passages.forEach(p => {
    const pill = document.createElement("span");
    pill.className = "source-pill";
    pill.innerHTML = `${p.category} › ${p.topic.slice(0, 40)}${p.topic.length > 40 ? "…" : ""}
      <span class="score">${(p.score * 100).toFixed(1)}%</span>`;
    sec.appendChild(pill);
  });
  bubble.appendChild(sec);
}

// ── Conversation history (plain text, no injected context) ──────────────────
const conversationHistory = [];

// ── Main send logic ─────────────────────────────────────────────────────────
async function sendQuery() {
  const query = inputEl.value.trim();
  if (!query) return;

  inputEl.value = "";
  inputEl.style.height = "auto";
  sendBtn.disabled = true;

  appendBubble(query, "user");
  const typing = appendTyping();

  const topK = parseInt(document.getElementById("top-k").value);

  try {
    // First retrieve passages (debug endpoint), then stream the answer
    const [passResp, streamResp] = await Promise.all([
      fetch(`/passages/search?q=${encodeURIComponent(query)}&top_k=${topK}`),
      fetch("/query/stream", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ query, top_k: topK, history: conversationHistory }),
      })
    ]);

    const passData = await passResp.json();
    typing.remove();

    const botBubble = appendBubble("", "bot");
    const reader = streamResp.body.getReader();
    const decoder = new TextDecoder();
    let fullText = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value, { stream: true });
      fullText += chunk;
      botBubble.textContent = fullText;
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    // Save this turn to history so future turns have context
    conversationHistory.push({ role: "user", content: query });
    conversationHistory.push({ role: "assistant", content: fullText });

    appendSources(botBubble, passData.results);

  } catch (err) {
    typing.remove();
    appendBubble("⚠️ Error: " + err.message, "bot");
  }

  sendBtn.disabled = false;
  inputEl.focus();
}
</script>
</body>
</html>
